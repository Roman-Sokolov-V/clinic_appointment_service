services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - .env
    environment:
      - IN_DOCKER=True # використовується в settings для підключення постгресс бд якщо запущено в контейнері
    volumes:
      - clinic_db:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  clinic:
    build: .
    entrypoint: ["./entrypoint.sh"]
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy

volumes:
  clinic_db: